name: Publish crates (core -> cli)
on:
  push:
    tags:
      - 'v*'
      - 'core-v*'
      - 'cli-v*'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish crates (core then cli)
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      RUSTUP_HOME: /tmp/rustup
      CARGO_HOME: /tmp/cargo
      TMPDIR: /tmp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare temp dirs
        run: |
          set -euo pipefail
          # Use RUNNER_TEMP when available, otherwise fall back to /tmp (act/local)
          TEMP_DIR="${RUNNER_TEMP:-/tmp}"
          mkdir -p "$TEMP_DIR/rustup" "$TEMP_DIR/.cargo"
          echo "RUSTUP_HOME=$TEMP_DIR/rustup" >> "$GITHUB_ENV"
          echo "CARGO_HOME=$TEMP_DIR/.cargo" >> "$GITHUB_ENV"
          echo "TMPDIR=$TEMP_DIR" >> "$GITHUB_ENV"
        shell: bash

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Read crate versions
        id: versions
        run: |
          set -euo pipefail
          # Read versions from each crate's Cargo.toml (searching the [package] section)
          CORE_VERSION=$(awk -F\" '/\[package\]/{p=1} p && /^version/ {print $2; exit}' crates/core/Cargo.toml)
          CLI_VERSION=$(awk -F\" '/\[package\]/{p=1} p && /^version/ {print $2; exit}' crates/cli/Cargo.toml)
          echo "core_version=$CORE_VERSION" >> "$GITHUB_OUTPUT"
          echo "cli_version=$CLI_VERSION" >> "$GITHUB_OUTPUT"

      - name: Determine publish plan from tag
        id: plan
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          PUBLISH_CORE=false
          PUBLISH_CLI=false
          echo "Tag is: $TAG"
          # tag conventions:
          #  - core-vX.Y.Z  -> publish core only
          #  - cli-vX.Y.Z   -> publish cli only
          #  - vX.Y.Z       -> publish both
          if [[ "$TAG" == core-v* ]]; then PUBLISH_CORE=true; fi
          if [[ "$TAG" == cli-v* ]]; then PUBLISH_CLI=true; fi
          if [[ "$TAG" == v* ]]; then PUBLISH_CORE=true; PUBLISH_CLI=true; fi
          echo "publish_core=$PUBLISH_CORE" >> "$GITHUB_OUTPUT"
          echo "publish_cli=$PUBLISH_CLI" >> "$GITHUB_OUTPUT"

      - name: Check if bonds-core exists on crates.io
        id: core_exists
        if: ${{ steps.plan.outputs.publish_core == 'true' || steps.plan.outputs.publish_cli == 'true' }}
        env:
          CORE_VERSION: ${{ steps.versions.outputs.core_version }}
        run: |
          set -euo pipefail
          # Get the HTTP status without failing on non-2xx
          status=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/bonds-core/${CORE_VERSION}") || true
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if bonds-cli exists on crates.io
        id: cli_exists
        if: ${{ steps.plan.outputs.publish_cli == 'true' }}
        env:
          CLI_VERSION: ${{ steps.versions.outputs.cli_version }}
        run: |
          set -euo pipefail
          status=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/bonds-cli/${CLI_VERSION}") || true
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package & publish bonds-core
        id: do_publish_core
        if: ${{ steps.plan.outputs.publish_core == 'true' && steps.core_exists.outputs.exists != 'true' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          # Build the package and publish to crates.io (non-interactive)
          cargo package -p bonds-core --locked
          cargo publish -p bonds-core --locked --token "$CARGO_REGISTRY_TOKEN"
          # Mark that we published core in this run
          echo "published=true" >> "$GITHUB_OUTPUT"

      # - name: Wait for crates.io index propagation for bonds-core
      #   if: ${{ steps.do_publish_core.outputs.published == 'true' }}
      #   env:
      #     CORE_VERSION: ${{ steps.versions.outputs.core_version }}
      #   run: |
      #     set -euo pipefail
      #     # Retry loop with exponential backoff to wait until crates.io serves the new version
      #     max_attempts=12
      #     attempt=0
      #     sleep_secs=5
      #     while [ $attempt -lt $max_attempts ]; do
      #       status=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/bonds-core/${CORE_VERSION}") || true
      #       if [ "$status" = "200" ]; then
      #         echo "bonds-core ${CORE_VERSION} visible on crates.io"
      #         exit 0
      #       fi
      #       attempt=$((attempt+1))
      #       echo "Attempt $attempt/$max_attempts: crates.io returned status=$status; sleeping $sleep_secs"
      #       sleep $sleep_secs
      #       sleep_secs=$((sleep_secs*2))
      #     done
      #     echo "::error::bonds-core ${CORE_VERSION} was not visible on crates.io after publish; last status=$status"
      #     exit 1

      - name: Package & publish bonds-cli
        id: do_publish_cli
        if: ${{ steps.plan.outputs.publish_cli == 'true' && steps.cli_exists.outputs.exists != 'true' && (steps.core_exists.outputs.exists == 'true' || steps.do_publish_core.outputs.published == 'true') }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          # If core was published earlier in this run, the wait step ensured it's visible.
          cargo package -p bonds-cli --locked
          cargo publish -p bonds-cli --locked --token "$CARGO_REGISTRY_TOKEN"
          echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Fail early if CLI cannot be verified
        if: ${{ steps.plan.outputs.publish_cli == 'true' && steps.cli_exists.outputs.exists != 'true' && steps.core_exists.outputs.exists != 'true' && steps.do_publish_core.outputs.published != 'true' }}
        run: |
          echo "::error::Cannot verify bonds-cli because bonds-core ${{ steps.versions.outputs.core_version }} is not published on crates.io (core check status=${{ steps.core_exists.outputs.status }})."
          echo "::error::If you intended to publish core as part of this release, push a core tag (core-v...). Otherwise publish core first or ensure crates.io is accessible."
          exit 1

      - name: Publish summary
        run: |
          echo "publish_core=${{ steps.plan.outputs.publish_core }}"
          echo "publish_cli=${{ steps.plan.outputs.publish_cli }}"
          echo "core_exists=${{ steps.core_exists.outputs.exists }}"
          echo "cli_exists=${{ steps.cli_exists.outputs.exists }}"